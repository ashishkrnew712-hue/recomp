name: Build Android APK

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    name: Build APK (Gradle)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Cache Expo prebuild
        uses: actions/cache@v4
        with:
          path: android
          key: expo-prebuild-${{ hashFiles('package.json', 'app.json') }}

      - name: Expo prebuild (generate android/ folder)
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties', 'android/build.gradle') }}
          restore-keys: gradle-

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Release APK
        run: cd android && ./gradlew assembleRelease --no-daemon
        env:
          GRADLE_OPTS: -Xmx4g -XX:MaxMetaspaceSize=512m

      - name: Rename APK
        run: |
          mkdir -p artifacts
          cp android/app/build/outputs/apk/release/app-release*.apk artifacts/recomp-$(date +%Y%m%d-%H%M).apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: recomp-apk
          path: artifacts/*.apk
          retention-days: 30
