name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:        # allows manual trigger from GitHub UI

jobs:
  build:
    name: Build APK via EAS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK (preview)
        run: eas build --platform android --profile preview --non-interactive

      - name: Download APK and upload as artifact
        run: |
          APK_URL=$(eas build:list --platform android --status finished --limit 1 --json --non-interactive | \
            node -e "const d=require('fs').readFileSync('/dev/stdin','utf8'); console.log(JSON.parse(d)[0]?.artifacts?.buildUrl ?? '')")
          if [ -n "$APK_URL" ]; then
            curl -L "$APK_URL" -o recomp-preview.apk
          fi
        continue-on-error: true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: recomp-apk
          path: "*.apk"
          if-no-files-found: warn
          retention-days: 30
